name: Secret Scan (Push Protection)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # PR にコメントするために必要
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 全履歴を取得してコミット全体をスキャン
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
